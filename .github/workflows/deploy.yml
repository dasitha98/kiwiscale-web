name: KiwiScale

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            set -e

            cd /root/kiwiscale-web

            git fetch origin
            git reset --hard origin/main

            npm ci

            rm -rf .next

            npm run build

            pm2 restart kiwiscale-web

            pm2 save